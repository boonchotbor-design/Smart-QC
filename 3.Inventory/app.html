<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <style>
    body { background-color: #f0f2f5; padding: 15px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    .card { margin-bottom: 20px; border: none; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    .header-card { background: linear-gradient(135deg, #007bff, #0056b3); color: white; }
    .item-row { background: white; padding: 15px; border-radius: 10px; margin-bottom: 10px; border: 1px solid #e0e0e0; }
    .btn-add { border-radius: 10px; border: 2px dashed #007bff; color: #007bff; background: white; }
    .btn-submit { border-radius: 10px; padding: 12px; font-weight: bold; font-size: 1.1em; }
    .form-label { font-weight: 600; color: #495057; }
  </style>
</head>
<body>
  <div class="container pb-5">
    <div class="card header-card p-4 text-center">
      <h2 class="mb-0">📦 Inventory Master-Detail</h2>
      <p class="opacity-75">บันทึกหลายรายการในใบงานเดียว</p>
    </div>
    
    <!-- 🚩 Header Information -->
    <div class="card p-4">
      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label">ลูกค้า (Customer)</label>
          <select id="customer" class="form-select">
            <option value="AIS">AIS</option>
            <option value="TRUE">TRUE</option>
          </select>
        </div>
        <div class="col-md-6">
          <label class="form-label">ประเภทงาน</label>
          <select id="type" class="form-select">
            <option value="IN">IN (รับเข้า)</option>
            <option value="OUT">OUT (จ่ายออก)</option>
            <option value="DISMANTLE">DISMANTLE</option>
            <option value="RETURN">RETURN</option>
          </select>
        </div>
        <div class="col-md-6">
          <label class="form-label">Bill No. / Picking List</label>
          <input type="text" id="billNo" class="form-control" placeholder="สแกนหรือพิมพ์เลขที่บิล">
        </div>
        <div class="col-md-6">
          <label class="form-label">DUID</label>
          <input type="text" id="duid" class="form-control" placeholder="ระบุ DUID">
        </div>
        <div class="col-md-6">
          <label class="form-label">Site Code</label>
          <input type="text" id="site" class="form-control" placeholder="ระบุ Site Code">
        </div>
        <div class="col-md-6">
          <label class="form-label">Project Code</label>
          <input type="text" id="project" class="form-control" placeholder="ระบุ Project Code">
        </div>
      </div>
    </div>

    <!-- 🚩 Items Detail -->
    <h5 class="mb-3 d-flex justify-content-between align-items-center">
      รายการอุปกรณ์ในใบงาน
      <span class="badge bg-primary" id="rowCountDisplay">0 รายการ</span>
    </h5>
    
    <div id="itemList">
      <!-- Dynamic Rows -->
    </div>

    <button class="btn btn-add w-100 py-3 mb-4" onclick="addItemRow()">
      <i class="bi bi-plus-circle"></i> ➕ เพิ่มรายการอุปกรณ์ (Item)
    </button>

    <button class="btn btn-primary btn-submit w-100 shadow-lg" onclick="submitAll()" id="btnSubmit">
      🚀 บันทึกทั้งหมดลง Spreadsheet
    </button>
  </div>

  <script>
    let rowCount = 0;

    function addItemRow() {
      rowCount++;
      const div = document.createElement('div');
      div.className = 'item-row shadow-sm animate__animated animate__fadeIn';
      div.id = 'row_' + rowCount;
      div.innerHTML = `
        <div class="row g-3">
          <div class="col-8 col-md-5">
            <label class="small text-muted">Item Code / Part No.</label>
            <input type="text" class="form-control item-code" placeholder="สแกน Item">
          </div>
          <div class="col-4 col-md-2">
            <label class="small text-muted">จำนวน</label>
            <input type="number" class="form-control item-qty" value="1" min="1">
          </div>
          <div class="col-12 col-md-4">
            <label class="small text-muted">Serial Number (SN)</label>
            <input type="text" class="form-control item-sn" placeholder="สแกน SN ของชิ้นนี้">
          </div>
          <div class="col-12 col-md-1 d-flex align-items-end">
            <button class="btn btn-outline-danger w-100" onclick="removeRow(${rowCount})">🗑️</button>
          </div>
        </div>
      `;
      document.getElementById('itemList').appendChild(div);
      updateBadge();
    }

    function removeRow(id) {
      document.getElementById('row_' + id).remove();
      updateBadge();
    }

    function updateBadge() {
      const count = document.querySelectorAll('.item-row').length;
      document.getElementById('rowCountDisplay').innerText = count + ' รายการ';
    }

    function submitAll() {
      const btn = document.getElementById('btnSubmit');
      const header = {
        customer: document.getElementById('customer').value,
        type: document.getElementById('type').value,
        billNo: document.getElementById('billNo').value,
        duid: document.getElementById('duid').value,
        site: document.getElementById('site').value,
        project: document.getElementById('project').value
      };

      const items = [];
      const rows = document.querySelectorAll('.item-row');
      rows.forEach(row => {
        items.push({
          code: row.querySelector('.item-code').value,
          qty: row.querySelector('.item-qty').value,
          sn: row.querySelector('.item-sn').value
        });
      });

      if (!header.billNo || items.length === 0) {
        alert('❌ กรุณากรอก Bill No และเพิ่มรายการอย่างน้อย 1 รายการ');
        return;
      }

      btn.disabled = true;
      btn.innerText = '⌛ กำลังบันทึกข้อมูล...';

      google.script.run.withSuccessHandler((res) => {
        alert('✅ บันทึกสำเร็จเรียบร้อย!');
        location.reload();
      }).withFailureHandler((err) => {
        alert('⚠️ เกิดข้อผิดพลาด: ' + err);
        btn.disabled = false;
        btn.innerText = '🚀 บันทึกทั้งหมดลง Spreadsheet';
      }).saveMultiData(header, items);
    }

    // Initialize first row
    window.onload = addItemRow;
  </script>
</body>
</html>
