<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
  <style>
    body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background-color: #f3f4f6; }
    .status-loading { animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
  </style>
</head>
<body class="p-3 max-w-lg mx-auto">

  <div class="bg-blue-600 text-white p-4 rounded-t-lg flex justify-between items-center shadow-md">
    <h1 class="text-lg font-bold flex items-center">📦 Smart Inventory V.6.7.4</h1>
    <div>
      <button onclick="window.location.reload()" class="bg-yellow-500 hover:bg-yellow-600 text-xs text-black font-semibold px-2 py-1 rounded mr-1">Verify</button>
      <button class="bg-white text-blue-600 text-xs font-semibold px-2 py-1 rounded shadow">🔄 SYNC</button>
    </div>
  </div>

  <div class="bg-yellow-400 p-4 shadow-inner text-center">
    <label class="block font-bold text-gray-800 mb-2">📸 ถ่ายรูปบิล (Mandatory) *</label>
    
    <input type="file" id="billInput" accept="image/*" class="hidden" onchange="handleFileChange(this)">
    <button onclick="document.getElementById('billInput').click()" class="bg-white hover:bg-gray-100 text-gray-800 font-medium py-2 px-4 border border-gray-400 rounded shadow-sm w-full transition duration-150">
      🖼️ แนบรูปจากเครื่อง / เปิดกล้องถ่ายภาพ
    </button>
    
    <div id="fileStatus" class="text-sm font-semibold text-red-700 mt-2">⚠️ ยังไม่มีรูปบิล</div>
  </div>

  <div class="bg-white p-4 rounded-b-lg shadow-md space-y-3">
    <div class="grid grid-cols-2 gap-3">
      <div>
        <label class="block text-xs font-bold text-gray-700 mb-1">ลูกค้า</label>
        <select id="customer" class="w-full border p-2 rounded text-sm bg-gray-50">
          <option value="AIS">AIS</option>
          <option value="TRUE">TRUE</option>
        </select>
      </div>
      <div>
        <label class="block text-xs font-bold text-gray-700 mb-1">งาน</label>
        <select id="jobType" class="w-full border p-2 rounded text-sm bg-gray-50">
          <option value="IN">IN</option>
          <option value="OUT">OUT</option>
          <option value="RETURN">RETURN</option>
        </select>
      </div>
    </div>

    <div>
      <label class="block text-xs font-bold text-gray-700 mb-1">Region</label>
      <select id="region" class="w-full border p-2 rounded text-sm bg-gray-50">
        <option value="ER">ER</option>
        <option value="NER">NER</option>
        <option value="SR">SR</option>
        <option value="NR">NR</option>
        <option value="CR">CR</option>
        <option value="BKK">BKK</option>
      </select>
    </div>

    <div>
      <label class="block text-xs font-bold text-gray-700 mb-1">Bill No. *</label>
      <div class="flex gap-2">
        <input type="text" id="billNo" placeholder="เลขที่บิล" class="w-full border p-2 rounded text-sm">
        <button onclick="startOcrProcess()" id="btnScan" class="bg-blue-500 text-white px-4 py-2 rounded text-sm font-bold shadow hover:bg-blue-600">📷 Scan</button>
      </div>
    </div>

    <div>
      <label class="block text-xs font-bold text-red-600 mb-1">DUID (Mandatory) *</label>
      <input type="text" id="duid" placeholder="ค้นหาหรือกรอก DUID" class="w-full border-2 border-red-300 p-2 rounded text-sm focus:border-red-500">
    </div>

    <div class="grid grid-cols-2 gap-3">
      <div>
        <label class="block text-xs font-bold text-gray-700 mb-1">คลัง Owner *</label>
        <input type="text" id="whOwner" class="w-full border p-2 rounded text-sm">
      </div>
      <div>
        <label class="block text-xs font-bold text-gray-700 mb-1">ผู้รับ Owner *</label>
        <input type="text" id="rcOwner" class="w-full border p-2 rounded text-sm">
      </div>
    </div>

    <div class="grid grid-cols-2 gap-3">
      <div>
        <label class="block text-xs font-bold text-gray-700 mb-1">Location warehouse</label>
        <input type="text" id="locWh" placeholder="Location ต้นทาง" class="w-full border p-2 rounded text-sm">
      </div>
      <div>
        <label class="block text-xs font-bold text-gray-700 mb-1">Location Receiver</label>
        <input type="text" id="locRc" placeholder="Location ปลายทาง" class="w-full border p-2 rounded text-sm">
      </div>
    </div>

    <button onclick="saveAllDataToSheet()" id="btnSave" class="w-full bg-green-600 text-white p-3 rounded-lg font-bold text-base shadow hover:bg-green-700 transition duration-150 mt-4">
      🚀 บันทึกข้อมูลเข้าระบบ
    </button>
  </div>

  <script>
    var globalBase64Image = ""; // ตัวแปรเก็บภาพที่ย่อขนาดเสร็จแล้วในรูปแบบ Base64

    // 📸 ฟังก์ชันหัวใจสำคัญ: ย่อรูปภาพและบีบอัดอัตโนมัติเพื่อแก้ไขปัญหากล้อง iPhone 15 ละเอียดเกินไป
    function resizeAndCompressImage(file, callback) {
      var reader = new FileReader();
      reader.onload = function(e) {
        var img = new Image();
        img.onload = function() {
          var canvas = document.createElement('canvas');
          var MAX_WIDTH_HEIGHT = 1200; // บีบความกว้าง/สูงเหลือสูงสุดไม่เกิน 1200px ชัดเจนพอสำหรับอ่านตัวหนังสือ
          var width = img.width;
          var height = img.height;

          if (width > height) {
            if (width > MAX_WIDTH_HEIGHT) {
              height *= MAX_WIDTH_HEIGHT / width;
              width = MAX_WIDTH_HEIGHT;
            }
          } else {
            if (height > MAX_WIDTH_HEIGHT) {
              width *= MAX_WIDTH_HEIGHT / height;
              height = MAX_WIDTH_HEIGHT;
            }
          }

          canvas.width = width;
          canvas.height = height;
          var ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, width, height);

          // แปลงไฟล์เป็น JPEG และดรอปคุณภาพลงเหลือ 75% ไฟล์จะเหลือไม่ถึง 200KB หลบอาการแรมล่มของ iOS ได้ 100%
          var compressedBase64 = canvas.toDataURL('image/jpeg', 0.75);
          callback(compressedBase64);
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    }

    // ทำงานเมื่อผู้ใช้กดเลือกไฟล์หรือกดถ่ายรูปสดๆ จากกล้องมือถือ
    function handleFileChange(input) {
      if (input.files && input.files[0]) {
        document.getElementById('fileStatus').innerHTML = "⏳ กำลังย่อและบีบอัดรูปภาพ...";
        document.getElementById('fileStatus').className = "text-sm font-semibold text-yellow-600 mt-2 status-loading";
        
        // ส่งไฟล์ภาพไปทำการย่อขนาดทันทีก่อนที่เบราว์เซอร์จะโดนปิดตัว
        resizeAndCompressImage(input.files[0], function(base64Data) {
          globalBase64Image = base64Data; // จัดเก็บรูปย่อลงตัวแปรสากล
          document.getElementById('fileStatus').innerHTML = "✅ แนบรูปภาพบิลขนาดเบาเรียบร้อย (พร้อมสแกน)";
          document.getElementById('fileStatus').className = "text-sm font-semibold text-green-700 mt-2";
        });
      }
    }

    // สั่งรันระะบบ OCR ฝั่งเซิร์ฟเวอร์
    function startOcrProcess() {
      if (!globalBase64Image) {
        alert("❌ กรุณาถ่ายรูปหรือแนบรูปภาพบิลก่อนทำการ Scan ครับ");
        return;
      }
      var btn = document.getElementById('btnScan');
      btn.innerHTML = "🌀 กำลังสแกน...";
      btn.disabled = true;

      // ส่งคำขอดึงฟังก์ชันสแกนอ่านค่าข้อความในโค้ดหลังบ้าน Code.gs
      google.script.run
        .withSuccessHandler(function(response) {
          btn.innerHTML = "📷 Scan";
          btn.disabled = false;
          if (response.success) {
            if(response.data.header.billNo !== "-") document.getElementById('billNo').value = response.data.header.billNo;
            if(response.data.header.duid !== "-") document.getElementById('duid').value = response.data.header.duid;
            if(response.data.header.region !== "-") document.getElementById('region').value = response.data.header.region;
            alert("✅ สแกนอ่านข้อมูลสำเร็จ!");
          } else {
            alert(response.error || "❌ ไม่สามารถอ่านค่าจากภาพได้ในขณะนี้");
          }
        })
        .withFailureHandler(function(err) {
          btn.innerHTML = "📷 Scan";
          btn.disabled = false;
          alert("เกิดข้อผิดพลาดในการเชื่อมต่อระบบสแกน: " + err.toString());
        })
        .processOCR(globalBase64Image);
    }

    // ฟังก์ชันรวบรวมข้อมูลทั้งหมดเพื่อส่งไปกดบันทึกลงใน Google Sheet
    function saveAllDataToSheet() {
      var duid = document.getElementById('duid').value.trim();
      if (!duid) { alert("❌ กรุณากรอกรหัส DUID ก่อนบันทึกข้อมูลครับ"); return; }
      
      var btn = document.getElementById('btnSave');
      btn.innerHTML = "⏳ กำลังบันทึกข้อมูลและส่งแจ้งเตือน...";
      btn.disabled = true;

      var headerData = {
        customer: document.getElementById('customer').value,
        type: document.getElementById('jobType').value,
        region: document.getElementById('region').value,
        billNo: document.getElementById('billNo').value,
        duid: duid,
        ownerWarehouse: document.getElementById('whOwner').value,
        ownerReceiver: document.getElementById('rcOwner').value,
        locationWarehouse: document.getElementById('locWh').value,
        locationReceiver: document.getElementById('locRc').value
      };

      var mockItems = [{ model: "BOM-ITEM-01", code: "NA", desc: "สแกนด่วนผ่านสมาร์ทโฟน", qty: 1, type: "OUT", sn: "NA" }];

      google.script.run
        .withSuccessHandler(function(res) {
          btn.innerHTML = "🚀 บันทึกข้อมูลเข้าระบบ";
          btn.disabled = false;
          if (res.success) {
            alert(res.debug || "✅ บันทึกข้อมูลและส่งแจ้งเตือนเข้ากลุ่ม LINE เรียบร้อยแล้วครับ!");
            // ถ้ามีรูปให้ส่งขึ้นไปบันทึกเก็บไว้ในโฟลเดอร์ Google Drive ด้วย
            if(globalBase64Image) {
              google.script.run.uploadPhotoOnly(headerData, globalBase64Image, 1);
            }
          } else {
            alert(res.message || "❌ ไม่สามารถบันทึกข้อมูลได้");
          }
        })
        .withFailureHandler(function(err) {
          btn.innerHTML = "🚀 บันทึกข้อมูลเข้าระบบ";
          btn.disabled = false;
          alert("ระบบขัดข้อง: " + err.toString());
        })
        .saveMainData(headerData, mockItems);
    }
  </script>
</body>
</html>
